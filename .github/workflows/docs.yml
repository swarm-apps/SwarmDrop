name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个 Pages 部署，且不取消进行中的（避免半成品上线）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      # 从根 package.json 的 packageManager 字段读唯一版本，避免冲突
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      # docs 通过自身的 docs/pnpm-workspace.yaml 建立独立 workspace 边界，
      # 避免被仓库根 workspace 劫持安装；native 依赖的 build 脚本也在该文件里 allowBuilds。
      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build docs (static export)
        env:
          # 必须匹配仓库名实际大小写：Pages 项目站点路径是 /SwarmDrop（大小写敏感），
          # 小写 /swarmdrop 会让 _next/* 资源 404（目录会重定向，文件不会）
          PAGES_BASE_PATH: /SwarmDrop
        run: pnpm build

      # 阻止 GitHub Pages 的 Jekyll 吞掉 _next/ 目录
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
