name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      min_version:
        description: '强制更新最低版本号 (如 0.2.0)，留空则不设置'
        required: false
        default: '0.1.2'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 生成当前版本的 changelog，供后续 job 使用
  generate-changelog:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

  build-tauri:
    needs: [generate-changelog]
    permissions:
      contents: write
    outputs:
      appVersion: ${{ steps.tauri-action.outputs.appVersion }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        id: tauri-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_UPGRADE_LINK_ACCESS_KEY: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
          VITE_UPGRADE_LINK_ACCESS_SECRET: ${{ secrets.UPGRADE_LINK_ACCESS_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: 'SwarmDrop v__VERSION__'
          releaseBody: ${{ needs.generate-changelog.outputs.changelog }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # 仅在 workflow_dispatch 指定 min_version 时打补丁；tag push 路径直接跳过。
  # 旧版本同时还在 latest.json 里塞 mobile.android.{version,download_url}，
  # 移动端拆到 swarm-apps/SwarmDrop-RN 之后这块已无意义。
  update-latest-json:
    if: ${{ github.event.inputs.min_version != '' }}
    needs: [build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --pattern "latest.json" \
            --dir . \
            --clobber || echo '{}' > latest.json

      - name: Patch min_version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MIN_VERSION="${{ github.event.inputs.min_version }}"
          jq --arg mv "$MIN_VERSION" '.min_version = $mv' latest.json > tmp.json
          mv tmp.json latest.json
          echo "=== Final latest.json ==="
          cat latest.json

      - name: Upload patched latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            latest.json \
            --clobber

  # 发布 Release（将草稿转为正式发布）
  # 必须在所有构建和 latest.json 更新完成后执行，
  # 这样 UpgradeLink 才能通过公开 URL 访问 release 资产
  publish-release:
    needs: [build-tauri, update-latest-json]
    # update-latest-json 走 if 条件 skip 时 needs 默认整个 publish-release 也会 skip；
    # 用 always() 强制等任意 needs 状态完成，再用 result != failure 判断成功/跳过
    if: ${{ always() && needs.build-tauri.result == 'success' && (needs.update-latest-json.result == 'success' || needs.update-latest-json.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get release tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.tag.outputs.tag }}" --draft=false

  # === UpgradeLink Sync ===
  # 参考: http://upgrade.toolsetlink.com/upgrade/example/tauri/tauri-action-example.html
  #
  # 需要配置的 GitHub Secrets:
  # - UPGRADE_LINK_ACCESS_KEY
  # - UPGRADE_LINK_ACCESS_SECRET
  # - UPGRADE_LINK_TAURI_KEY
  # 移动端 Android APK 同步已迁到 swarm-apps/SwarmDrop-RN release workflow。

  upgradeLink-upload:
    name: Sync to UpgradeLink
    needs: [publish-release]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # 同步 Tauri 桌面端 (统一 endpoint，支持 Win/Mac/Linux)
      - name: Sync Tauri to UpgradeLink
        uses: toolsetlink/upgradelink-action@3.0.2
        with:
          access_key: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
          access_secret: ${{ secrets.UPGRADE_LINK_ACCESS_SECRET }}
          config: |
            {
              "app_type": "tauri",
              "request": {
                "app_key": "${{ secrets.UPGRADE_LINK_TAURI_KEY }}",
                "latest_json_url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/latest.json"
              }
            }
