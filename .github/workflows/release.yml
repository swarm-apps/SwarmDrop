name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      min_version:
        description: '强制更新最低版本号 (如 0.2.0)，留空则不设置'
        required: false
        default: '0.1.2'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 生成当前版本的 changelog，供后续 job 使用
  generate-changelog:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # 单仓后两条版本线并存，桌面的 changelog 必须把移动端摘干净：
          #   --tag-pattern  只认桌面的 v* tag，不会把 mobile-v* 当成上一个版本
          #   --exclude-path 排掉 mobile/ 下的提交（RN 并入时带进 129 条历史，
          #                  且都是 unrelated history，不过滤会全落进「本次发布」——
          #                  实测 122 条 vs 过滤后 6 条）
          # crates/ 与 libs/ 不排除：两端共享，改动确实影响桌面。
          args: --latest --strip header --tag-pattern '^v[0-9]' --exclude-path 'mobile/**'

  # 桌面版本号散在三处，必须一起改（踩过坑，见 dev-notes/knowledge/toolchain.md）。
  # 这里在构建前闸掉不一致，而不是跑完 40 分钟四个 target 才发现错位。
  # 移动端不参与——单仓后两端各自打 tag(v* / mobile-v*)、各走一条版本线，
  # 移动端的对应校验在 mobile-release.yml。
  verify-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert desktop version sources agree
        run: |
          CONF=$(jq -r '.version' src-tauri/tauri.conf.json)
          PKG=$(jq -r '.version' package.json)
          CARGO=$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          echo "src-tauri/tauri.conf.json : $CONF   (release 真源，CI 用这个)"
          echo "package.json              : $PKG"
          echo "src-tauri/Cargo.toml      : $CARGO"

          fail=0
          for pair in "package.json:$PKG" "src-tauri/Cargo.toml:$CARGO"; do
            name="${pair%%:*}"; val="${pair#*:}"
            if [ "$val" != "$CONF" ]; then
              echo "::error::$name 的版本 $val 与 tauri.conf.json 真源 $CONF 不一致"
              fail=1
            fi
          done

          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_VER="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VER" != "$CONF" ]; then
              echo "::error::tag v$TAG_VER 与 tauri.conf.json 真源 $CONF 不一致"
              fail=1
            fi
          fi

          [ "$fail" = "0" ] && echo "✅ 桌面版本一致：$CONF" || exit 1

  build-tauri:
    needs: [generate-changelog, verify-versions]
    permissions:
      contents: write
    outputs:
      appVersion: ${{ steps.tauri-action.outputs.appVersion }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            swarmhive_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            swarmhive_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            swarmhive_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ''
            swarmhive_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        id: tauri-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'SwarmDrop v__VERSION__'
          releaseBody: ${{ needs.generate-changelog.outputs.changelog }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # === SwarmHive 发布:每个 target 上传到 draft(发布收尾在 finalize-swarmhive job)===
      # updater bundle 选取已内置进 swarmhive-action@v2 —— 只给 artifact-paths(glob),
      # action 自动挑真 updater bundle(.app.tar.gz/.AppImage(.tar.gz)/.nsis.zip/-setup.exe)、
      # 排除安装包(.dmg/.msi/.deb/.rpm),不再手写 jq/grep/test -f 选取脚本。

      # 把本次版本的 changelog(与 GitHub Release body 同源)写成文件,注入 SwarmHive
      # release notes。CI token 已含 release:update,重发时 PATCH notes 不再 forbidden。
      - name: Write SwarmHive release notes
        shell: bash
        env:
          RELEASE_NOTES: ${{ needs.generate-changelog.outputs.changelog }}
        run: printf '%s' "$RELEASE_NOTES" > swarmhive-notes.md

      - name: Upload ${{ matrix.swarmhive_target }} to SwarmHive (draft)
        # 去掉旧的 continue-on-error:依赖 action 的退出码红绿(权限/配置 exit 2 标红,不再被
        # 静默吞掉)。本步只上传到 draft,发布由末步 finalize-swarmhive 一次完成。
        uses: swarm-apps/swarmhive-action@v2
        with:
          server: ${{ secrets.SWARMHIVE_SERVER }}
          token: ${{ secrets.SWARMHIVE_TOKEN }}
          platform: tauri
          app: swarmdrop
          target: ${{ matrix.swarmhive_target }}
          notes-file: swarmhive-notes.md
          # src-tauri 是 Cargo workspace member,bundle 输出在仓库根 target/,
          # macOS 走 --target 子目录;linux/windows 无 --target 走 target/release。
          artifact-paths: |
            target/${{ matrix.swarmhive_target }}/release/bundle/**/*
            target/release/bundle/**/*

  # === SwarmHive 发布收尾 ===
  # 4 个 target 都上传到 draft 后,这里一次性 finalize(幂等发布)并把 stable 渠道指向它。
  # 取代旧的「每个 target 各自 publish=true 抢发布」——配合 server 端原子 upsert + 唯一索引,
  # 多 target 并发不再丢 artifact。发布失败(权限 exit 2 / 服务端 exit 1)会标红,不被吞。
  finalize-swarmhive:
    needs: [build-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: swarm-apps/swarmhive-action@v2
        with:
          server: ${{ secrets.SWARMHIVE_SERVER }}
          token: ${{ secrets.SWARMHIVE_TOKEN }}
          app: swarmdrop
          version: ${{ needs.build-tauri.outputs.appVersion }}
          finalize: "true"
          channel: stable

  # 仅在 workflow_dispatch 指定 min_version 时打补丁；tag push 路径直接跳过。
  # 旧版本同时还在 latest.json 里塞 mobile.android.{version,download_url}——那是移动端
  # 尚未独立发版时的遗留。移动端现在虽已并回单仓(mobile/)，但仍是独立版本线 + 独立
  # SwarmHive app(swarmdrop-rn)，由 mobile-release.yml 发布，不走这里的 latest.json。
  update-latest-json:
    if: ${{ github.event.inputs.min_version != '' }}
    needs: [build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --pattern "latest.json" \
            --dir . \
            --clobber || echo '{}' > latest.json

      - name: Patch min_version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MIN_VERSION="${{ github.event.inputs.min_version }}"
          jq --arg mv "$MIN_VERSION" '.min_version = $mv' latest.json > tmp.json
          mv tmp.json latest.json
          echo "=== Final latest.json ==="
          cat latest.json

      - name: Upload patched latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            latest.json \
            --clobber

  # 发布 Release（将草稿转为正式发布）
  # 必须在所有构建和 latest.json 更新完成后执行，
  # 这样 UpgradeLink 才能通过公开 URL 访问 release 资产
  publish-release:
    needs: [build-tauri, update-latest-json]
    # update-latest-json 走 if 条件 skip 时 needs 默认整个 publish-release 也会 skip；
    # 用 always() 强制等任意 needs 状态完成，再用 result != failure 判断成功/跳过
    if: ${{ always() && needs.build-tauri.result == 'success' && (needs.update-latest-json.result == 'success' || needs.update-latest-json.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get release tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.tag.outputs.tag }}" --draft=false

  # === SwarmHive 发布 ===
  # 已彻底移除 UpgradeLink（toolsetlink）同步。更新分发统一走自托管 SwarmHive。
  # 流程(harden-publish-flow):build-tauri 每个 target 构建完用 swarmhive-action@v2
  # 上传到 **draft**(4 个 target append 进同一 version 的 release),最后 finalize-swarmhive
  # job 一次性 finalize + 把 stable 渠道指向它。action v2 内置 updater bundle 选取、退出码红绿。
  # 桌面更新检查 endpoint 见 src-tauri/tauri.conf.json。
