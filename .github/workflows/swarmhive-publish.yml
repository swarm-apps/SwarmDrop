# Dogfood：用 GitHub Actions 构建 Tauri 并只发布到自托管 SwarmHive 服务器。
# 关键设计：tauri-action 不传 tagName → 只构建+签名，不创建 GitHub Release。
# 多 target 用 universal-apple-darwin（server 对 universal 特例放行任意 darwin arch），
# 直接调 @swarm-hive/cli 并带 --target（官方 swarmhive-action 当前缺 target input，
# 见 SwarmHive/dev-notes/dogfood-2026-06-20.md Finding #1）。
name: SwarmHive Publish (dogfood)

on:
  # push 触发绑定在 feature 分支上：推分支即自动跑，绕开 workflow_dispatch
  # 要求文件先在默认分支才可派发的限制（dogfood 迭代期间用）。
  push:
    branches: [feat/swarmhive-integration]
  workflow_dispatch:
    inputs:
      channel:
        description: 'SwarmHive channel to promote after publish'
        required: false
        default: 'beta'

concurrency:
  group: swarmhive-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable (darwin targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      # 只构建 + minisign 签名，不传 tagName ⇒ 不创建 GitHub Release。
      - name: Build (universal, signed)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: '--target universal-apple-darwin'

      # 直接驱动官方 CLI 发布到 SwarmHive（.app.tar.gz 旁的 .sig 由 CLI 自动配对上送）。
      - name: Publish to SwarmHive
        env:
          SWARMHIVE_SERVER: ${{ secrets.SWARMHIVE_SERVER }}
          SWARMHIVE_TOKEN: ${{ secrets.SWARMHIVE_TOKEN }}
        run: |
          set -euo pipefail
          # SwarmDrop 是 Cargo workspace，src-tauri 是成员 → bundle 落在「仓库根 target」，
          # 不是 src-tauri/target（swarmhive-cli skill 示例假设非 workspace，对此型应用是错的）。
          BUNDLE="target/universal-apple-darwin/release/bundle"
          APPTGZ=$(ls "$BUNDLE"/macos/*.app.tar.gz | head -1)
          echo "updater bundle: $APPTGZ"
          ARTS=(--artifact "$APPTGZ")
          DMG=$(ls "$BUNDLE"/dmg/*.dmg 2>/dev/null | head -1 || true)
          if [ -n "$DMG" ]; then echo "installer dmg : $DMG"; ARTS+=(--artifact "$DMG"); fi
          npx --yes @swarm-hive/cli@0.2.0 publish tauri \
            --app swarmdrop \
            --target universal-apple-darwin \
            "${ARTS[@]}" \
            --channel "${{ inputs.channel || 'beta' }}" \
            --notes "Dogfood publish via GitHub Actions (universal-apple-darwin)" \
            --output json
