<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>iroh-web spike (#60)</title>
    <style>
      body { font: 14px/1.6 ui-monospace, monospace; max-width: 820px; margin: 40px auto; padding: 0 16px; }
      h1 { font-size: 18px; }
      button { font: inherit; padding: 6px 14px; margin-right: 8px; cursor: pointer; }
      pre { background: #f4f4f4; padding: 12px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
      .ok { color: #0a7; } .err { color: #c33; } .muted { color: #888; }
    </style>
  </head>
  <body>
    <h1>iroh-web spike — #60 真·浏览器 runtime</h1>
    <p class="muted">
      验证 iroh 能否在真实浏览器里跑。两个按钮刻意分开：<br />
      「建 Endpoint」不碰网络，通过即证明 iroh 编进 wasm 且能跑；<br />
      「探 relay」才碰网络 —— 浏览器发不了 UDP、无直连兜底，relay 不通 = Web 端完全不可用。<br />
      分开是为了让失败原因唯一（见 #62：混在一起就分不清「iroh 不行」还是「relay 够不着」）。
    </p>

    <p>
      <button id="btn-endpoint">1. 建 Endpoint（不碰网络）</button>
      <button id="btn-relay">2. 探 relay（n0 公共 relay）</button>
    </p>

    <pre id="out">等待操作…</pre>

    <script type="module">
      import init, { create_endpoint_no_relay, probe_relay } from "./pkg/iroh_web.js";

      const out = document.getElementById("out");
      const log = (msg, cls = "") => {
        const t = new Date().toISOString().slice(11, 23);
        out.innerHTML += `\n<span class="${cls}">[${t}] ${msg}</span>`;
      };

      const t0 = performance.now();
      await init();
      log(`✅ wasm 已加载并初始化（${Math.round(performance.now() - t0)} ms）`, "ok");

      document.getElementById("btn-endpoint").onclick = async () => {
        log("建 Endpoint…");
        const t = performance.now();
        try {
          const id = await create_endpoint_no_relay();
          log(`✅ Endpoint 建立成功（${Math.round(performance.now() - t)} ms）`, "ok");
          log(`   EndpointId: ${id}`, "ok");
        } catch (e) {
          log(`❌ 失败: ${e}`, "err");
        }
      };

      document.getElementById("btn-relay").onclick = async () => {
        log("探 relay（可能耗时，取决于网络）…");
        const t = performance.now();
        try {
          const report = await probe_relay();
          log(`结果（${Math.round(performance.now() - t)} ms）:`, "");
          log(`   ${report}`, report.startsWith("✅") ? "ok" : "err");
        } catch (e) {
          log(`❌ 失败: ${e}`, "err");
        }
      };
    </script>
  </body>
</html>
