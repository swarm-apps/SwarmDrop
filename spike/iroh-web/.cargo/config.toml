# 取自 iroh 官方 browser-echo 示例。getrandom 0.3 在 wasm32-unknown-unknown 上
# 必须显式指定 backend，少这一行编译直接失败（且报错不指向这里）。
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']

# iroh 的 tls-ring feature 会拉进 ring，ring 要把 C 代码（curve25519 等）编到 wasm。
# **macOS 自带的 Apple clang 阉割了 WebAssembly backend**（`clang -print-targets`
# 一条 wasm 都没有），cc-rs 调它必然失败：
#   error: unable to create target: 'No available targets are compatible with triple "wasm32-unknown-unknown"'
# 所以要显式指向 Homebrew 的 LLVM（`brew install llvm`，自带 wasm32/wasm64）。
# 这不是 iroh 或 ring 的问题，是 macOS 工具链的问题；Linux 的发行版 clang 通常自带 wasm。
[env]
CC_wasm32_unknown_unknown = "/opt/homebrew/opt/llvm/bin/clang"
AR_wasm32_unknown_unknown = "/opt/homebrew/opt/llvm/bin/llvm-ar"
