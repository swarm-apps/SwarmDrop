<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>swarmdrop-net 浏览器冒烟</title>
  <style>
    body { font-family: ui-monospace, monospace; max-width: 780px; margin: 2rem auto; padding: 0 1rem; }
    input { width: 100%; box-sizing: border-box; margin: .25rem 0; padding: .4rem; }
    button { margin: .25rem .5rem .25rem 0; padding: .4rem .8rem; }
    #log { white-space: pre-wrap; background: #f4f4f4; padding: 1rem; min-height: 12rem; font-size: .85rem; }
  </style>
</head>
<body>
  <h1>swarmdrop-net 浏览器冒烟</h1>
  <p>先跑 <code>cargo run -- helper</code> 拿地址；ws 地址验证私网豁免，webrtc-direct 验证 certhash。</p>
  <div>本机 node id：<span id="nid">（未启动）</span></div>
  <input id="addr" placeholder="/ip4/192.168.x.x/tcp/x/ws/p2p/12D3Koo... 或 .../webrtc-direct/certhash/.../p2p/..." />
  <button id="btn-connect">① connect</button>
  <button id="btn-reserve">② reserve（circuit listen）</button>
  <input id="peer" placeholder="对端 node id（echo 目标）" />
  <input id="text" value="hello from browser" />
  <button id="btn-echo">③ echo</button>
  <div id="log"></div>
  <script type="module">
    import init, { WebNode } from "./pkg/net_web_smoke.js";
    const log = (m) => { document.getElementById("log").textContent += m + "\n"; };
    await init();
    const node = await WebNode.spawn();
    document.getElementById("nid").textContent = node.node_id();
    log("node spawned: " + node.node_id());

    const addr = () => document.getElementById("addr").value;
    document.getElementById("btn-connect").onclick = async () => {
      try { log(await node.connect(addr())); } catch (e) { log("❌ " + e); }
    };
    document.getElementById("btn-reserve").onclick = async () => {
      try { log(await node.reserve(addr())); } catch (e) { log("❌ " + e); }
    };
    document.getElementById("btn-echo").onclick = async () => {
      try {
        log(await node.echo(
          document.getElementById("peer").value,
          document.getElementById("text").value,
        ));
      } catch (e) { log("❌ " + e); }
    };
  </script>
</body>
</html>
