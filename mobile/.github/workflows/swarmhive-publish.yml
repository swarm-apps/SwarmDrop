# Dogfood：用 GitHub Actions 构建 Android APK 并只发布到自托管 SwarmHive 服务器。
# 镜像 build-android.yml 的构建链（ubrn Rust 桥 + expo prebuild + gradle assembleRelease），
# 末尾用 @swarm-hive/cli publish android 把签名 APK 推到 SwarmHive（beta 渠道），不创建 GitHub Release。
name: SwarmHive Publish (dogfood)

on:
  push:
    branches: [feat/swarmhive-integration]
  workflow_dispatch:
    inputs:
      channel:
        description: 'SwarmHive channel to promote after publish'
        required: false
        default: 'beta'

concurrency:
  group: swarmhive-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  NDK_VERSION: r27c
  PNPM_VERSION: "10"

jobs:
  build-and-publish:
    name: Build APK + publish to SwarmHive
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Android NDK ${{ env.NDK_VERSION }}
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          link-to-sdk: true

      - name: Setup Rust toolchain (Android targets)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          cache-workspaces: packages/swarmdrop-core/rust/mobile-core

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Rust bridge (ubrn android release)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: pnpm --filter react-native-swarmdrop-core build:android:release

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Gradle assemble (release, arm64-v8a)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon --stacktrace

      - name: Publish APK to SwarmHive
        env:
          SWARMHIVE_SERVER: ${{ secrets.SWARMHIVE_SERVER }}
          SWARMHIVE_TOKEN: ${{ secrets.SWARMHIVE_TOKEN }}
        run: |
          set -euo pipefail
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          VERSION=$(jq -r '.expo.version' app.json)
          VERSION_CODE=$(jq -r '.expo.android.versionCode // 1' app.json)
          echo "apk: $APK  version: $VERSION  versionCode: $VERSION_CODE"
          npx --yes @swarm-hive/cli@0.2.0 publish android \
            --app swarmdrop-rn \
            --version "$VERSION" \
            --version-code "$VERSION_CODE" \
            --abi arm64-v8a \
            --apk "$APK" \
            --channel "${{ inputs.channel || 'beta' }}" \
            --notes "Dogfood publish via GitHub Actions (arm64-v8a)" \
            --output json
