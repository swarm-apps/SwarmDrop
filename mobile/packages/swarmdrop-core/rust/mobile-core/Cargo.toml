[package]
name = "swarmdrop-mobile-core"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "swarmdrop_mobile_core"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
async-trait = "0.1"
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros"] }
uniffi = { version = "0.31.0", features = ["bindgen", "build", "cli", "tokio"] }
uuid = { version = "1", features = ["v4"] }
# SwarmDrop 主仓三个 workspace member —— 用 git ssh + develop 分支引用，
# 不再依赖 ../../../../../swarmdrop 平级目录硬连。要与本地未提交改动联调时，
# 临时把这三行改回 path = "../../../../../swarmdrop/crates/{core,entity,migration}"
# 或加 [patch."ssh://git@github.com/swarm-apps/SwarmDrop.git"] section 即可。
#
# swarm-p2p-core 通过 swarmdrop-core 传递引用——SwarmDrop 主仓的 libs/ 是 submodule，
# cargo git deps 默认会 fetch submodules（1.94+），所以不需要在这里再单独 dep。
# 一旦单独 dep，会和 SwarmDrop 仓内的 libs/core 版本冲突，编译报"multiple versions"。
swarmdrop-core = { git = "ssh://git@github.com/swarm-apps/SwarmDrop.git", branch = "develop" }
entity = { git = "ssh://git@github.com/swarm-apps/SwarmDrop.git", branch = "develop" }
migration = { git = "ssh://git@github.com/swarm-apps/SwarmDrop.git", branch = "develop" }
swarm-p2p-core = { git = "ssh://git@github.com/swarm-apps/SwarmDrop.git", branch = "develop" }
sea-orm = { version = "2.0.0-rc", features = [
    "macros",
    "runtime-tokio-rustls",
    "sqlx-sqlite",
    "with-chrono",
    "with-uuid",
] }
sea-orm-migration = { version = "2.0.0-rc", features = [
    "runtime-tokio-rustls",
    "sqlx-sqlite",
] }
tracing = "0.1"

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = "z"
strip = "symbols"
