[package]
name = "swarmdrop-mobile-core"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "swarmdrop_mobile_core"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
async-trait = "0.1"
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros"] }
uniffi = { version = "0.31.0", features = ["bindgen", "build", "cli", "tokio"] }
uuid = { version = "1", features = ["v4"] }
swarmdrop-core = { path = "../../../../../swarmdrop/crates/core" }
swarm-p2p-core = { path = "../../../../../swarmdrop/libs/core" }

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = "z"
strip = "symbols"
