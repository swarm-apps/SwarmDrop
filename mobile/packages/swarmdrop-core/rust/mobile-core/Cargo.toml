[package]
name = "swarmdrop-mobile-core"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "swarmdrop_mobile_core"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
async-trait = "0.1"
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros"] }
uniffi = { version = "0.31.0", features = ["bindgen", "build", "cli", "tokio"] }
uuid = { version = "1", features = ["v4"] }
# SwarmDrop 主仓四个 workspace member —— 走 HTTPS 而非 ssh://，CI runner 无
# SSH key 也能匿名 clone（SwarmDrop 仓是 public）。要与本地未提交改动联调时，
# 把这四行改回 path = "../../../../../SwarmDrop/crates/{core,entity,migration}"
# 和 path = "../../../../../SwarmDrop/libs/core"，git 与 path 不能混用，否则
# swarm-p2p-core 会撞 "multiple versions"。
#
# sync-mobile-core-runtime target:
# /Volumes/yexiyue/SwarmDrop develop 3167d2991659f61fc576b6f9a84abce769172c6d
# (open-containing-folder: finalize_sink 返回父目录 URI + content_root/local_dir 贯穿)
swarmdrop-core = { git = "https://github.com/swarm-apps/SwarmDrop.git", rev = "3167d2991659f61fc576b6f9a84abce769172c6d" }
entity = { git = "https://github.com/swarm-apps/SwarmDrop.git", rev = "3167d2991659f61fc576b6f9a84abce769172c6d" }
migration = { git = "https://github.com/swarm-apps/SwarmDrop.git", rev = "3167d2991659f61fc576b6f9a84abce769172c6d" }
swarm-p2p-core = { git = "https://github.com/swarm-apps/SwarmDrop.git", rev = "3167d2991659f61fc576b6f9a84abce769172c6d" }
sea-orm = { version = "2.0.0-rc", features = [
    "macros",
    "runtime-tokio-rustls",
    "sqlx-sqlite",
    "with-chrono",
    "with-uuid",
] }
sea-orm-migration = { version = "2.0.0-rc", features = [
    "runtime-tokio-rustls",
    "sqlx-sqlite",
] }
tracing = "0.1"

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = "z"
strip = "symbols"
