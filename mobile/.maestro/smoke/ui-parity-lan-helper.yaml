appId: com.yexiyue.swarmdrop
name: UI parity - LAN helper switch
# #6:设置 > 网络新增的「本机 LAN Helper」开关(provideLanHelper 此前只读,现可写)。
---
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 30000
- runFlow:
    when:
      visible: "Later"
    commands:
      - tapOn: "Later"
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- tapOn: "设置"
- extendedWaitUntil:
    visible:
      id: settings-screen
    timeout: 15000
- tapOn:
    id: settings-network-row
- extendedWaitUntil:
    visible:
      id: network-settings-screen
    timeout: 15000
- scrollUntilVisible:
    element:
      id: network-provide-lan-helper-switch
    direction: DOWN
    timeout: 15000
- assertVisible:
    id: network-provide-lan-helper-switch
- takeScreenshot: ui-parity-lan-helper-before
- tapOn:
    id: network-provide-lan-helper-switch
- waitForAnimationToEnd
- takeScreenshot: ui-parity-lan-helper-after
- tapOn:
    id: network-provide-lan-helper-switch
- waitForAnimationToEnd
