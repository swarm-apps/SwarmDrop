appId: com.yexiyue.swarmdrop
name: UI parity - inbox search screen
# #8:收件箱搜索屏可达 + 搜索输入框(客户端命中高亮在有数据时生效)。
---
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 30000
- runFlow:
    when:
      visible: "Later"
    commands:
      - tapOn: "Later"
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- tapOn: "收件箱"
- extendedWaitUntil:
    visible:
      id: inbox-screen
    timeout: 15000
- tapOn:
    id: inbox-open-search-button
- extendedWaitUntil:
    visible:
      id: inbox-search-screen
    timeout: 15000
- assertVisible:
    id: inbox-search-input
- tapOn:
    id: inbox-search-input
- inputText: "report"
- waitForAnimationToEnd
- takeScreenshot: ui-parity-inbox-search
