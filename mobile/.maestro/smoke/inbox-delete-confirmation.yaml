appId: com.yexiyue.swarmdrop
name: SwarmDrop inbox delete confirmation smoke
---
- launchApp
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 30000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- tapOn:
    id: tab-inbox
- extendedWaitUntil:
    visible:
      id: inbox-screen
    timeout: 15000
# 条件覆盖：仅当收件箱有数据（inbox-list）时才真正执行删除确认流程。
# 默认 CI 无预置收件箱数据时整段跳过，不计为有效覆盖（需预置收件箱数据夹具方可常驻执行）。
- runFlow:
    when:
      visible:
        id: inbox-list
    commands:
      - tapOn:
          id: inbox-row-0
      - extendedWaitUntil:
          visible:
            id: inbox-detail-screen
          timeout: 15000
      - tapOn:
          id: inbox-detail-delete-record-button
      - extendedWaitUntil:
          visible:
            id: inbox-delete-confirmation
          timeout: 15000
      - assertVisible:
          id: inbox-delete-confirm-button
      - tapOn:
          id: inbox-delete-cancel-button
      - extendedWaitUntil:
          visible:
            id: inbox-detail-screen
          timeout: 15000
      - back
- takeScreenshot: inbox-delete-confirmation-smoke
