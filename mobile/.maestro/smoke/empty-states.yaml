appId: com.yexiyue.swarmdrop
name: SwarmDrop empty states smoke
---
- clearState
- launchApp
- extendedWaitUntil:
    visible:
      id: onboarding-start-button
    timeout: 30000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- tapOn:
    id: onboarding-start-button
- extendedWaitUntil:
    visible:
      id: onboarding-device-name-input
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- hideKeyboard
- extendedWaitUntil:
    visible:
      id: onboarding-device-name-continue-button
    timeout: 15000
- tapOn:
    id: onboarding-device-name-continue-button
- extendedWaitUntil:
    visible:
      id: onboarding-enter-button
    timeout: 60000
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- tapOn:
    id: onboarding-enter-button
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 30000
- assertVisible:
    id: devices-empty-state
- tapOn:
    id: tab-inbox
- extendedWaitUntil:
    visible:
      id: inbox-screen
    timeout: 15000
- assertVisible:
    id: inbox-empty-state
- tapOn:
    id: tab-devices
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 15000
- tapOn:
    id: devices-open-activity-button
- extendedWaitUntil:
    visible:
      id: activity-screen
    timeout: 15000
- assertVisible:
    id: activity-empty-state
- tapOn:
    id: activity-clear-button
- extendedWaitUntil:
    visible:
      id: activity-clear-confirmation
    timeout: 15000
- assertVisible:
    id: activity-clear-confirm-button
- tapOn:
    id: activity-clear-cancel-button
- extendedWaitUntil:
    visible:
      id: activity-screen
    timeout: 15000
- back
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 15000
- takeScreenshot: empty-states-smoke
