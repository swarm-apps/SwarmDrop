appId: com.yexiyue.swarmdrop
name: SwarmDrop device policy smoke
---
- launchApp
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 30000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: device-card-0
    commands:
      - tapOn:
          id: device-card-0
      - extendedWaitUntil:
          visible:
            id: device-detail-screen
          timeout: 15000
      - assertVisible:
          id: device-policy-entry
      - tapOn:
          id: device-policy-entry
      - extendedWaitUntil:
          visible:
            id: device-policy-sheet
          timeout: 15000
      - assertVisible:
          id: device-policy-trust-owned
      - assertVisible:
          id: device-policy-trust-collaborator
      - assertVisible:
          id: device-policy-trust-temporary
      - assertVisible:
          id: device-policy-trust-blocked
      - assertVisible:
          id: device-policy-save-button
      - takeScreenshot: device-policy-sheet
- runFlow:
    when:
      visible:
        id: devices-empty-state
    commands:
      - assertVisible:
          id: devices-empty-state
