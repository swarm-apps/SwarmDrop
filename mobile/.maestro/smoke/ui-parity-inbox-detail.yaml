appId: com.yexiyue.swarmdrop
name: UI parity - inbox detail provenance
# #1:收件箱详情的「来源类型」标签(详情面板默认可见)。
# (文件行 checksum 曾属此 parity 项,2026-07 详情页精致化时有意移除:协议细节不上一级界面。)
# 依赖本机收件箱已有 1 条记录(1000022660.mp4)。
---
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 30000
- runFlow:
    when:
      visible: "Later"
    commands:
      - tapOn: "Later"
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- tapOn: "收件箱"
- extendedWaitUntil:
    visible:
      id: inbox-screen
    timeout: 15000
- assertVisible:
    id: inbox-list
- tapOn:
    id: inbox-row-0
- extendedWaitUntil:
    visible:
      id: inbox-detail-screen
    timeout: 15000
- assertVisible:
    id: inbox-detail-summary
# 「来源类型」行在详情面板默认区(无需展开)
- scrollUntilVisible:
    element:
      text: "来源类型"
    direction: DOWN
    timeout: 15000
- assertVisible: "来源类型"
- takeScreenshot: ui-parity-inbox-detail-provenance
