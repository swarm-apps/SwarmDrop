appId: com.yexiyue.swarmdrop
name: SwarmDrop mobile foundation smoke
---
- launchApp
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 30000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- assertVisible:
    id: tab-devices
- assertVisible:
    id: tab-inbox
- assertVisible:
    id: tab-settings
- tapOn:
    id: devices-manage-node-button
- extendedWaitUntil:
    visible:
      id: node-control-sheet-content
    timeout: 15000
- tapOn:
    id: node-control-cancel-button
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 15000
- tapOn:
    id: devices-add-device-button
- extendedWaitUntil:
    visible:
      id: pairing-sheet-content
    timeout: 15000
# 添加设备 sheet:附近设备 + 本机配对码 + 输入配对码入口(无 tab,滚动式)
- assertVisible:
    id: devices-local-code
- assertVisible:
    id: devices-open-input-code-sheet-button
- tapOn:
    point: "50%,20%"
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 15000
- tapOn:
    id: tab-inbox
- extendedWaitUntil:
    visible:
      id: inbox-screen
    timeout: 15000
# 条件覆盖：仅当收件箱有数据时断言首行存在；默认 CI（空收件箱）不执行此分支，
# 不计为有效覆盖。空态无需 when→assertVisible 同元素的永真断言——inbox-screen 已覆盖。
- runFlow:
    when:
      visible:
        id: inbox-list
    commands:
      - assertVisible:
          id: inbox-row-0
- tapOn:
    id: tab-settings
- extendedWaitUntil:
    visible:
      id: settings-screen
    timeout: 15000
- tapOn:
    id: tab-devices
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 15000
- tapOn:
    id: devices-open-activity-button
- extendedWaitUntil:
    visible:
      id: activity-screen
    timeout: 15000
- back
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 15000
- takeScreenshot: mobile-foundation-smoke
