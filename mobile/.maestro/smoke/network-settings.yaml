appId: com.yexiyue.swarmdrop
name: SwarmDrop network settings smoke
---
- launchApp
- extendedWaitUntil:
    visible:
      id: devices-screen
    timeout: 30000
- runFlow:
    when:
      visible: "Open debugger to view warnings."
    commands:
      - tapOn:
          point: "92%,92%"
- waitForAnimationToEnd
- tapOn:
    id: tab-settings
- extendedWaitUntil:
    visible:
      id: settings-screen
    timeout: 15000
- tapOn:
    id: settings-network-row
- extendedWaitUntil:
    visible:
      id: network-settings-screen
    timeout: 15000
- assertVisible:
    id: network-discovery-auto
- assertVisible:
    id: network-discovery-lan-only
- assertVisible:
    id: network-auto-lan-helper-switch
- assertVisible:
    id: network-bootstrap-advanced-entry
- tapOn:
    id: network-bootstrap-advanced-entry
- extendedWaitUntil:
    visible:
      id: bootstrap-nodes-screen
    timeout: 15000
- assertVisible:
    id: bootstrap-add-custom-node-button
- back
- extendedWaitUntil:
    visible:
      id: network-settings-screen
    timeout: 15000
- takeScreenshot: network-settings-smoke
